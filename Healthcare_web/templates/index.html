<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Doctor</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #1e293b;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: #3b82f6;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Chat */
.chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* Messages */
.message {
    margin: 8px 0;
    padding: 12px;
    border-radius: 12px;
    max-width: 60%;
    line-height: 1.4;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #14b8a6;
    align-self: flex-start;
}

/* Input */
.input-area {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
}

button.send {
    margin-left: 10px;
    padding: 12px 20px;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🩺 AI Doctor</h2>
        <button onclick="loadChat()">Chat</button>
        <button onclick="loadDashboard()">Dashboard</button>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Chat -->
        <div id="chat" class="chat-box"></div>

        <!-- Input -->
        <div class="input-area">
            <input id="input" placeholder="Describe symptoms...">
            <button class="send" onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>
function addMessage(text, sender) {
    if (!text) return;

    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = "message " + sender;
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })  // ✅ correct key
    })
    .then(res => res.json())
    .then(data => {
        console.log("API Response:", data); // debug

        // ✅ FIXED (no more undefined)
        addMessage(data.reply || "No response from AI", "bot");
    })
    .catch(err => {
        addMessage("Error connecting to server", "bot");
    });

    input.value = "";
}

/* Dashboard */
function loadDashboard() {
    fetch("/dashboard-data")
    .then(res => res.json())
    .then(data => {
        const chat = document.getElementById("chat");

        chat.innerHTML = `
            <h2>📊 Dashboard</h2>
            <p><b>Visits:</b> ${data.visits}</p>
            <p><b>Users:</b> ${data.users}</p>
            <p><b>Reports:</b> ${data.reports}</p>
        `;
    });
}

/* Back to chat */
function loadChat() {
    document.getElementById("chat").innerHTML = "";
}
</script>

</body>
</html>
